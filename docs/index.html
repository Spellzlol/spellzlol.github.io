<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Docs</title>
<style>
  :root {
    --bg: #050810;
    --text: #d4dde6;
    --text-muted: #8a98a8;
    --accent: #5fc3e8;
    --border: #1a2638;
    --mono: ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 24px 96px;
  }
  h1 {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 12px;
  }
  p { color: var(--text-muted); margin: 0 0 32px; }
  ul {
    list-style: none;
    margin: 0;
    padding: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  li + li { border-top: 1px solid var(--border); }
  a {
    display: block;
    padding: 18px 20px;
    color: var(--text);
    text-decoration: none;
  }
  a:hover { background: rgba(95, 195, 232, 0.06); }
  a strong {
    display: block;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 15px;
    margin-bottom: 4px;
  }
  a span { color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>
<main>
  <h1>Documentation</h1>
  <p>Internal guides hosted on GitHub Pages.</p>
  <ul>
    <li>
      <a href="barks-system-guide.html">
        <strong>Barks System</strong>
        <span>Designer guide for the refactored NPC bark system (RU)</span>
      </a>
    </li>
  </ul>
</main>
</body>
</html>
